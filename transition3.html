<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T3</title>
</head>
<style>
    .one{
        width: 150px;
        height: 150px;
        border-radius: 5px;
        background-color: rgb(255, 234, 180);
        transition: width 1s, height 1s ,background-color 2s;
    }

    .one:hover{
        width: 200px;
        height: 200px;
        background-color: rgb(183, 123, 247);
    }
</style>
<body>
    <div class="one"></div>
</body>
</html>
