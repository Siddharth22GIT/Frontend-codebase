<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slideshow</title>
</head>
<body>
    <img id="slide" width="100px", height="100px">

    <script>
        let images = [
            "images/bunny.jpg", "images/me.jpg", "images/scene1.png", "images/scene2.png"
        ]

        let index = 0

        function changeImage(){
            document.getElementById("slide").src = images[index]
            index = (index + 1) % images.length
        }

        let imgID = setInterval(changeImage, 2000);

    </script>
</body>
</html>
