<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayIMAGE</title>
</head>
<body>
    <img src="/images/scene1.png" alt="" id="mainImage" width="500px">
    <br><br>
    <img src="/images/scene1.png" alt="" height="60px" width="100px" onclick="changeImage(this)">
    <img src="/images/scene2.png" alt="" height="60px" width="100px" onclick="changeImage(this)">
    <img src="/images/caffe.jpg" alt="" height="60px" width="100px" onclick="changeImage(this)">
</body>
<script>
    function changeImage(img){
        document.getElementById("mainImage").src = img.src
    }
</script>
</html>
