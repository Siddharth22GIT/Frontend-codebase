<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" name="" id="keyInput" placeholder="Dabao!"><br>
    <p>Key Pressed: <span id="keyOutput"></span></p>
</body>
<script>
    document.getElementById("keyInput").onkeypress = function(event){
        document.getElementById("keyOutput").innerText = event.key
    }
</script>
</html>
