<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password visible</title>
</head>
<body>
    <input type="password" name="" id="passwd" placeholder="Enter your password">
    <button onclick="togglePassword()">👀</button>
</body>
<script>
    function togglePassword(){
        let pass = document.getElementById("passwd")
        if(pass.type === "password"){
            pass.type = "text"
        }else{
            pass.type = "password"
        }
    }
</script>
</html>
