<script>
    class Student{
        constructor(name, age, course = "CSE"){
            this.name = name
            this.age = age
            this.course = course
        }

        displayInfo(){
            console.log(this.name)
            console.log(this.age)
            console.log(this.course)
        }
    }
    const s1 = new Student("Sid", "20")
    s1.displayInfo()

    
</script>
