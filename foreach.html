// TASK 

        let student = [1,2,3,4,5]
        let newstudent = [6,7,8,9,10]

        for(let i = 0; i<newstudent.length; i++){
            student.push(newstudent[i])
        }

        let topper = 69
        student.unshift(topper)

        for(let i = 0; i<2; i++){
            student.pop()
        }

        student.forEach(student => {
            document.writeln(student + "<br>")
        })
    </script>
