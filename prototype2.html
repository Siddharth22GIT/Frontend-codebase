<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Prototype</h2>
    <p id="output"></p>
    <script>
        //constructor
        function Person(name)
        {
            this.name=name;
        }
        Person.prototype.sayHello = function()
        {
            return "Hello mt name is " + this.name;
        }

        //creating an object
        let p1=new Person("ABC");
        //disolay the output

        document.getElementById("output").innerHTML=p1.sayHello();  
        p1.sayHello();
    </script>
</body>
</html>
