<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
    <title>College Event Form</title>
    <style>
        .myClass {
            color: red;
            font-size: 18px;
            font-weight: bold;
        }
        img{
            width: 300px;
        }
    </style>
<body>
<h2>College Event Contact Form</h2>

<form onsubmit="storeDate(); return false;">

    <label>Name:</label>
    <input type="text" id="name"><br><br>

    <label>Email:</label>
    <input type="email" id="email"><br><br>

    <label>Date:</label>
    <input type="date" id="date"><br><br>

    <input type="submit" value="Submit">
    <input type="reset" value="Reset">

</form>

<h3>Selected Dates:</h3>
<ul id="dateList"></ul>


<img id="img" src="/images/scene1.png">
<br><br>
<button onclick="toggleImage()">Toggle Image</button>


<p class="myClass">Paragraph One</p>
<p class="myClass">Paragraph Two</p>

<script>

function storeDate() {
    var date = document.getElementById("date").value;

    var li = document.createElement("li");
    li.innerHTML = date;

    document.getElementById("dateList").appendChild(li);

    document.forms[0].reset();  
}

function toggleImage() {
    var img = document.getElementById("img");

    if (img.style.display == "none") {
        img.style.display = "block";
    } else {
        img.style.display = "none";
    }
}

</script>

</body>
</html>
