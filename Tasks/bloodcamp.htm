<!-- Form - name, email, dept, school, contact, how many events arranged till date, gender, date of reporting, upload photo -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood-camp</title>
    <link rel="stylesheet" href="bloodcamp.css">
    <style>
        form{
            padding: 10px;
        }
    </style>
</head>
<body>
   <h2 style="font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;">Blood Camp🩸</h2> 
   <form style="border: 2px solid;">
    <label>Name</label>
    <input type="text" name="name" placeholder="Enter your name"><br><br>

    <label>Email</label>
    <input type="email" name="email" id=""><br><br>

    <label for="">Department</label>
    <input type="radio" name="" id="">CSE 
    <input type="radio" name="" id="">ECE
    <input type="radio" name="" id="">MEC
    <input type="radio" name="" id="">CIV
    <br><br>

    <label for="">School</label>
    <input type="text" name="" id=""><br><br>

    <label for="">Contact no</label>
    <input type="number" name="" id=""><br><br>

    <label for="">Events organized</label>
    <input type="number" name="" id=""><br><br>

    <label for="">Gender</label>
    <input type="radio" name="" id="">Male
    <input type="radio" name="" id="">Female <br><br>

    <label for="">Date of reporting</label>
    <input type="date" name="" id=""><br><br>

    <label for="">Upload pic</label>
    <input type="file" name="photo" id=""><br><br>

    <input type="submit" value="SUBMIT">
   </form>
</body>
</html>
