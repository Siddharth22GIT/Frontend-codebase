<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
</body>
<script>
    class Student{
        constructor(name, age, course = "CSE"){
            this.name = name
            this.age = age
            this.course = course
        }

            
    displayInfo()
    {
        console.log(`Name: ${this.name}`)
        console.log(`Age: ${this.age}`)
        console.log(`Course: ${this.course}`)
        
    }

    }


    // Arrow function wit rest parameters

    const calculateAverage = (...marks) => {
        const total = marks.reduce((sum, mark) => sum + mark, 0)
        return total/marks.length
    }

    //Promise function
    const getResult = (average) => {
        return new Promise((resolve, reject) => {
            setTimeout(() => {
                if(average >= 40)
                resolve(`Result: pass with average ${average}`)
                else
                reject(`Result: Fail with average ${average}`)                                                                                                           
            }, 2000);
        })
    }

    //Async function

    const showResult = async(average) => {
        try {
            const result = await getResult(average)
            console.log(result)
        } catch (error) {
            console.log(error); 
        }
    }

    const main = () => {
        const student = new Student("Sid", 21) // Object creation

        console.log("Student details");
        console.log(student.displayInfo());
        
        //array
        let marks = [75,80,85]

        //DESTRUCTURING

        let [m1,m2,m3] = marks

        console.log("\nMarks");
        console.log(`Marks of 1st: ${m1}`);
        console.log(`Marks of 2nd: ${m2}`);
        console.log(`Marks of 3rd: ${m3}`);

        //spread

        let updatedMarks = [...marks,90]

        //Calculate average using spread operator

        const average = calculateAverage(...updatedMarks)
        console.log(`Calcualted average: ${average}`)

        showResult(average)
    }

    main()
</script>
</html>
