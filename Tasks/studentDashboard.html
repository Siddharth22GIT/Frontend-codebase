<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>
</head>
<style>
    body {
        margin: 0%;
        padding: 0%;
    }

    .header {
        border: 2px solid black;
        display: flex;
        align-items: center;
        box-sizing: border-box;

        .themeToggle {
            position: absolute;
            right: 2%;
        }
    }

    .main {
        display: flex;
        border: 2px solid black;
        height: 100vh;
        .sidebar {
            border: 2px solid black;
            ul {
                list-style: none;
                margin: 0px;
                padding: 0px;
                background-color: black;
                color: white;
                li{
                    border-bottom: 1px solid white;
                    width: 200px;
                    padding: 10%;
                }
            }
        }

        .cards {
            border: 2px solid black;
            display: flex;
            flex-direction: column;
            text-align: center;
            width: 100%;

            .container{
                display: flex;
                padding: 20px;
                gap: 10px;
                flex-wrap: wrap;
                overflow-y: scroll;
                justify-content: center;
            }


                .card {
                    background-color: aliceblue;
                    box-shadow: 0px 2px 8px gray;
                    padding: 10px;
                    height: 320px;
                    border-radius: 7px;
                    img {
                        border-radius: 5px;
                        width: 100%;
                        height: 200px;
                        object-fit: cover;
                    }
                }

            }

        }
</style>

<body>
    <div class="header">
        <div class="nav">
            <h2>Student dashboard</h2>
        </div>
        <div class="themeToggle">
            <button>🌻</button>
        </div>
    </div>

    <div class="main">
        <div class="sidebar">
            <ul>
                <li>Home</li>
                <li>Courses</li>
                <li>Assignment</li>
                <li>Profile</li>
            </ul>
        </div>

        <div class="cards">
            <h2>Welcome student</h2>
            <div class="container">
                <div class="card">
                    <img src="/images/scene1.png" alt="">
                    <h2>Java Programming</h2>
                    <p>Best java courses</p>
                    <button>Buy course</button>
                </div>
                <div class="card">
                    <img src="/images/scene1.png" alt="">
                    <h2>C++ Programming</h2>
                    <p>Best C++ courses</p>
                    <button>Buy course</button>
                </div>
                <div class="card">
                    <img src="/images/scene1.png" alt="">
                    <h2>Python Programming</h2>
                    <p>Best Python courses</p>
                    <button>Buy course</button>
                </div>
            </div>

            <h2>Contact Teacher</h2>
            <form action="">
                <label for="">Name</label>
                <input type="text"><br><br>
                <label for="">Message</label>
                <textarea name="" id=""></textarea>
            </form>
        </div>
    </div>
</body>

</html>
