<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIT form</title>
    <style>
        body{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0px;
            padding: 0px;
        }
        .header{
            background-color: orange;
            text-align: center;
            border-radius: 5px;
            padding: 10px;
            margin-bottom: 20px;

            h1{
                font-size: 60px;
            }
            h1:hover{
                color: white;
            }
        }
        img{
            width: 420px;
            height: 250px;
        }
        .gallery{
            display: grid;
            gap: 20px;
             grid-template-columns: repeat(3,1fr);
             overflow: scroll;
             height: 400px;
        }
        .reg-form{
            justify-content: center;
            text-align: center;
            margin-top: 20px;
            background-color: black;
            color: white;
            padding: 20px;
            width: 400px;
            margin-left: 430px;
        }
a{
    text-decoration: none;
}
        .social{
            margin-top: 20px;
            background-color: orange;
            padding: 20px;
            text-align: center;
            display: flex;
            justify-content: center;
            gap: 50px;
        }
    </style>
</head>
<body>
    <header>
<div class="header">
    <h1>M I T</h1>
    <p>Registration portal</p>
</div>
    </header>
    <main>
        <h1><u>Campus pics</u></h1>
<div class="gallery">

</div>
<div class="reg-form">
    <form>
        <h1>Registration form</h1>
        <label for="name">Name</label>
        <input type="text" name="Name" id="">
        <br><br>
        <label for="email">Email</label>
        <input type="email" name="email" id="">
        <br><br>
        <label for="conact">Contact</label>
        <input type="number" name="contact" id="">
        <br><br>
        <input type="submit" value="Submit">
    </form>
</div>
    </main>
    <footer>
<div class="social">
    <a href="">Instagram</a>

</div>

</html>
