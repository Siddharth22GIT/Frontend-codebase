<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brew & Bite</title>
</head>
<style>
    body{
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-image: url(https://images.pexels.com/photos/10215906/pexels-photo-10215906.jpeg?_gl=1*1g03l36*_ga*MTUwMTMwMDkwNC4xNzcwMjIyMjE5*_ga_8JE65Q40S6*czE3NzA2MTYyMjIkbzIkZzEkdDE3NzA2MTYyODIkajYwJGwwJGgw);
        background-size: cover;
        color: white;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;

    }

    h1{
        font-size: 80px;
    }

    img{
        border-radius: 5px;
        opacity: 90%;
    }

    .content{
        margin: 100px;
        display: flex;
        gap: 100px;
        gap: 100px;
        button{
            background-color: rgb(255, 102, 0);
            width: 200px;
            height: 50px;
            border-radius: 5px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 20px;
            font-weight: bold;
        }

        button:hover{
            scale: 1.05;
        }
    }
    .card1{
        display: grid;
        overflow-y: scroll;
        gap: 20px;
        width: 500px;
        height: 400px;
        background-color: rgb(0, 31, 7);
        justify-content: center;
        align-items: center;
        button{
            margin-left: 130px;
        }
        img{
            width: 470px;
            height: 300px;
            margin: 5px;
            border-radius: 10px;
        }
    }

    .card2{
        width: 500px;
        height: 400px;
        text-align: center;
        background-color: rgb(0, 0, 0);
        justify-content: center;
        align-items: center;
        font-size: 50px;
    }
    
</style>
<body>
    <h1>Brew & Bite</h1>
    <img id="slide" width="650px" height="430px" />

<div class="content">
    <div class="card1">
        <img src="../images/dish1.jpg" alt="">
        <button onclick="counter()">Add</button>
        <img src="../images/dish2.jpg" alt="">
        <button onclick="counter()">Add</button>
        <img src="../images/dish3.jpg" alt="">
        <button onclick="counter()">Add</button>
        <img src="../images/dish4.jpg" alt="">
        <button onclick="counter()">Add</button>
        <img src="../images/dish5.jpg" alt="">
        <button onclick="counter()">Add</button>
    </div>
    <div class="card2">
        <h3>Cart🛒</h3>
        <p id="cntr">0</p>
        <button onclick="clr()">Clear</button>
    </div>
</div>
</body>
<script>
        let img = [
            "../images/dish1.jpg", "../images/dish2.jpg", "../images/dish3.jpg", "../images/dish4.jpg", "../images/dish5.jpg"
        ]
        let index = 0
        function changeImage(){
            document.getElementById("slide").src = img[index]
            index = (index + 1) % img.length
        }
        changeImage()
        setInterval(changeImage, 2000);


        function counter(){
            let count = document.getElementById('cntr')
            count.innerText = Number(count.innerText) + 1     
        }

        function clr(){
            document.getElementById("cntr").innerText = 0
        }

    </script>
</html>
