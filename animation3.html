<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A3</title>
</head>
<style>

    body{
        display: flex;
        justify-content: center;
        align-items: center;
        height: 70vh;
    }
    .second{
        width: 150px;
        height: 150px;
        background-color: peachpuff;
        position: relative;
        animation: moveBox 3s infinite;
    }

    @keyframes moveBox {
        0%{
            left: 0px;
        }
        50%{
            left: 100px;
        }
        75%{
            bottom: 100px;
        }
        100%{
            left: 0px;
        }
    }
</style>
<body>
    <div class="second"></div>
</body>
</html>
